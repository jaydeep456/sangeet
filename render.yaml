services:
  - type: web
    name: sangeet-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false        # You will fill this in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false        # You will fill this in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false        # You will fill this in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false        # You will fill this in Render dashboard
      - key: FRONTEND_URL
        sync: false        # Set to your Vercel frontend URL
